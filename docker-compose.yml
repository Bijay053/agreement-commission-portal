services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agreement_portal
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d agreement_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://portal_user:${DB_PASSWORD:-changeme_in_production}@db:5432/agreement_portal
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - uploads:/app/uploads

  celery-worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://portal_user:${DB_PASSWORD:-changeme_in_production}@db:5432/agreement_portal
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      REDIS_URL: redis://redis:6379/0
    command: celery -A config worker --loglevel=info
    volumes:
      - uploads:/app/uploads

  celery-beat:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://portal_user:${DB_PASSWORD:-changeme_in_production}@db:5432/agreement_portal
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: "False"
      REDIS_URL: redis://redis:6379/0
    command: celery -A config beat --loglevel=info

volumes:
  pgdata:
  redisdata:
  uploads:
