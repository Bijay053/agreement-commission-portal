version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agreement_portal
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d agreement_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://portal_user:${DB_PASSWORD:-changeme_in_production}@db:5432/agreement_portal
      SESSION_SECRET: ${SESSION_SECRET:-generate_a_strong_secret_here}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "80:5000"
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
