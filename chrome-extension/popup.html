<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Portal Autofill Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      width: 340px;
      background: #fff;
      color: #1a1a1a;
    }
    h3 {
      font-size: 15px;
      margin-bottom: 4px;
      color: #1e293b;
    }
    .subtitle {
      font-size: 11px;
      color: #64748b;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
    }
    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .checkbox-row span {
      font-size: 13px;
      color: #334155;
    }
    button {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      color: #16a34a;
      display: none;
    }
    .help {
      margin-top: 14px;
      padding: 10px;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }
    .help strong { color: #334155; }
  </style>
</head>
<body>
  <h3>Study Info Centre</h3>
  <div class="subtitle">Portal Credential Autofill</div>

  <label>CRM Base URL</label>
  <input type="text" id="crmBaseUrl" placeholder="https://portal.studyinfocentre.com" />

  <label>Session Cookie (sessionid)</label>
  <input type="password" id="sessionCookie" placeholder="Paste sessionid cookie value" />

  <div class="checkbox-row">
    <input type="checkbox" id="autoSubmit" />
    <span>Auto-submit login form after fill</span>
  </div>

  <button id="saveBtn">Save Settings</button>

  <div class="status" id="status">Settings saved</div>

  <div class="help">
    <strong>How to get your session cookie:</strong><br>
    1. Log in to the CRM portal<br>
    2. Open browser DevTools (F12) &rarr; Application &rarr; Cookies<br>
    3. Copy the <code>sessionid</code> value<br>
    4. Paste it above
  </div>

  <script src="popup.js"></script>
</body>
</html>
